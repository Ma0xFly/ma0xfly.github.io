<!DOCTYPE html><html lang="zh-Hans"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>计算机基础 | 目录浏览</title><meta name="description" content="一套从私有笔记筛选公开内容的个人博客。"><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"><script>
      (() => {
        try {
          const saved = localStorage.getItem("theme");
          const theme = saved === "dark" || saved === "light"
            ? saved
            : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", theme);
        } catch {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script><link rel="stylesheet" href="/_astro/_folder_.Coc4ZbWY.css"></head> <body class> <!-- 首页导航栏：悬浮透明，叠在 Hero 上方 --> <div class="page-shell"> <header class="topbar"> <a class="brand" href="/">Notebook Dispatch</a> <nav class="nav-links"> <a href="/" class>首页</a> <a href="/folders" class="active">目录</a> <a href="/tags" class>标签</a> <button id="theme-toggle" type="button" aria-label="切换主题"> <span class="theme-icon theme-sun">☼</span> <span class="theme-icon theme-moon">☾</span> </button> </nav> </header> </div> <main id="main-content" class="page-shell page-main">  <a href="/folders" class="back-link">&larr; 返回目录列表</a> <section class="garden-section hero"> <h1>计算机基础</h1> <p class="lead">该目录下共收录 2 篇已公开文章。</p> </section> <section class="garden-section"> <div class="post-list"> <a href="/posts/计算机基础/计算机组成/" class="post-row"> <span class="date">2026-4-14</span> <div> <h3 class="title">计算机组成</h3> <p class="row-meta"> 无标签 </p> </div> </a><a href="/posts/计算机基础/计算机网络/" class="post-row"> <span class="date">2026-4-14</span> <div> <h3 class="title">计算机网络</h3> <p class="row-meta"> 无标签 </p> </div> </a> </div> </section>  </main> <script>
      (() => {
        const root = document.documentElement;
        const bindToggle = () => {
          const btn = document.getElementById("theme-toggle");
          if (!btn) return;
          const next = btn.cloneNode(true);
          btn.replaceWith(next);
          next.addEventListener("click", () => {
            const current = root.getAttribute("data-theme") === "dark" ? "dark" : "light";
            const value = current === "dark" ? "light" : "dark";
            root.setAttribute("data-theme", value);
            try { localStorage.setItem("theme", value); } catch {}
          });
        };
        bindToggle();
      })();
    </script> </body> </html>
