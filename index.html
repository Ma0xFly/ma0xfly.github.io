      (() => {
        const root = document.documentElement;
        const scrollFlagKey = "scroll-to-top-once";

        const bindScrollReset = () => {
          try {
            if ("scrollRestoration" in history) {
              history.scrollRestoration = "manual";
            }

            if (sessionStorage.getItem(scrollFlagKey) === "1") {
              sessionStorage.removeItem(scrollFlagKey);
              requestAnimationFrame(() => window.scrollTo({ top: 0, left: 0, behavior: "auto" }));
            }
          } catch {}

          document.addEventListener("click", (event) => {
            const target = event.target;
            if (!(target instanceof Element)) return;

            const link = target.closest("a");
            if (!(link instanceof HTMLAnchorElement)) return;

            if (link.target && link.target !== "_self") return;
            if (link.hasAttribute("download")) return;

            const href = link.getAttribute("href");
            if (!href || href.startsWith("#")) return;

            try {
              const url = new URL(link.href, window.location.href);
              if (url.origin !== window.location.origin) return;
              if (url.pathname === window.location.pathname && url.hash) return;
              sessionStorage.setItem(scrollFlagKey, "1");
            } catch {}
          });
        };

        const bindToggle = () => {
          const btn = document.getElementById("theme-toggle");
          if (!btn) return;
          const next = btn.cloneNode(true);
          btn.replaceWith(next);
          next.addEventListener("click", () => {
            const current = root.getAttribute("data-theme") === "dark" ? "dark" : "light";
            const value = current === "dark" ? "light" : "dark";
            root.setAttribute("data-theme", value);
            try { localStorage.setItem("theme", value); } catch {}
          });
        };

        bindScrollReset();
        bindToggle();
      })();

接口，彻底解决了各种生息协议之间无法\"},{\"href\":\"/posts/web3/ERC标准/ERC-3643/\",\"date\":\"2026-4-15\",\"title\":\"ERC-3643\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# ERC-3643: 合规型资产证券化代币 (T-REX / RWA Token) > **一句话总结**：ERC-3643 是一套极其严格的“链上白名单门禁系统”。它专为映射现实世界受监管资产（RWA，如股权、债券、房地产）而生，确保在公有链上的代币转账符合每一个现实主权国家\"},{\"href\":\"/posts/web3/ERC标准/ERC-3156/\",\"date\":\"2026-4-15\",\"title\":\"ERC-3156\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# ERC-3156: 闪电贷标准 (Flash Loans) > **一句话总结**：ERC-3156 提供了一套标准化的接口，规定了借款人 (Borrower) 如何向放贷池 (Lender) 借用巨额资金并在**同一笔以太坊交易内**完成归还，是 DeFi 乐高中实现无缝套\"},{\"href\":\"/posts/web3/ERC标准/ERC-2612/\",\"date\":\"2026-4-15\",\"title\":\"ERC-2612\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# ERC-2612: Permit 扩展标准 > **一句话总结**：通过 EIP-712 签名机制替代传统 `approve` 交易，实现链下授权链上执行，节省一笔交易并提升用户体验。 ## 📜 核心元数据与参阅资料 (Metadata & References) > **\"},{\"href\":\"/posts/web3/ERC标准/ERC-223/\",\"date\":\"2026-4-15\",\"title\":\"ERC-223\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# ERC-223: 防误转改进标准 (Token Fallback Standard) > **一句话总结**：ERC-223 是以太坊主网上极早期的 ERC-20 改进提案，核心旨在通过强制性“接收钩子（Fallback）”机制，解决 ERC-20 代币极其容易被误转入不支持\"},{\"href\":\"/posts/web3/ERC标准/ERC-20/\",\"date\":\"2026-4-15\",\"title\":\"ERC-20\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# ERC-20: 同质化代币通用标准 > **一句话总结**：ERC-20 是以太坊上最早、最普及的“同质化代币（Fungible Token）”智能合约记账标准。它统一了全网所有代币的授权、转账接口，是 DeFi 和整个 Web3 金融大厦的基础地砖。 ## 📜 核心元数据\"},{\"href\":\"/posts/web3/ERC标准/ERC-165/\",\"date\":\"2026-4-15\",\"title\":\"ERC-165\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# ERC-165: 接口检测标准 (Standard Interface Detection) > **一句话总结**：ERC-165 是智能合约界发明的“自省（Introspection）”功能。它强制要求智能合约挂出一块招牌，告诉外界自己到底实现了哪些标准接口，是防呆机制和\"},{\"href\":\"/posts/web3/ERC标准/ERC-1363/\",\"date\":\"2026-4-15\",\"title\":\"ERC-1363\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# ERC-1363: 可支付型代币扩展 (Payable Token) > **一句话总结**：ERC-1363 是对 ERC-20 标准最安全、最成功的演进补丁。它吸取了前辈们的教训，用标准化的 `TransferAndCall` 解决了双重审批（Approve + Exec\"},{\"href\":\"/posts/web3/ERC标准/ERC-1155/\",\"date\":\"2026-4-15\",\"title\":\"ERC-1155\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# ERC-1155: 多代币标准 (Multi-Token Standard) > **一句话总结**：ERC-1155 是链游和复杂衍生品体系的超级大本营。它打破了“发一个币就得建一个新合约”的铁律，允许在一个独立的智能合约中同时管理无数种真金白银（ERC-20）和独一无二的\"},{\"href\":\"/posts/web3/ERC标准/ERC-1046/\",\"date\":\"2026-4-15\",\"title\":\"ERC-1046\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# ERC-1046: ERC-20 互操作性元数据扩展 (Token Metadata Extension) > **一句话总结**：ERC-1046 是一个为了让 ERC-20 同质化代币拥有像 NFT 一样丰富视觉展示（图标、介绍文字、官网链接）而诞生的元数据 URI 挂载\"},{\"href\":\"/posts/web3/ERC标准/目录/\",\"date\":\"2026-4-15\",\"title\":\"目录\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# ERC 标准笔记 ## 基础代币标准 - [ERC-20：可替代代币标准](ERC-20.md) - [ERC-721：非同质化代币标准](ERC-721.md) - [ERC-1155：多代币标准](ERC-1155.md) ## 金融与金库标准 - [ERC-4626：代\"},{\"href\":\"/posts/web3/EIP标准/EIP-2612/\",\"date\":\"2026-4-15\",\"title\":\"EIP-2612\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# EIP-2612: ERC-20 Permit — 基于签名的授权扩展 (Permit Extension for EIP-20 Signed Approvals) > **一句话总结**：EIP-2612 为标准 ERC-20 代币引入了一个 `permit()` 函数，允\"},{\"href\":\"/posts/web3/EIP标准/EIP-1967/\",\"date\":\"2026-4-15\",\"title\":\"EIP-1967\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# EIP-1967: 标准代理存储插槽 (Standard Proxy Storage Slots) > **一句话总结**：EIP-1967 规定了智能合约代理（Proxy）存放逻辑合约地址（Implementation）、管理员地址（Admin）以及信标地址（Beacon）\"},{\"href\":\"/posts/web3/EIP标准/EIP-1559/\",\"date\":\"2026-4-15\",\"title\":\"EIP-1559\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# EIP-1559: 费用市场改革 (Fee market change for ETH 1.0 chain) > **一句话总结**：EIP-1559 彻底重构了以太坊的交易费用定价机制——从原来的\\\"盲目竞价拍卖\\\"（First-Price Auction）改为由**协议自动计\"},{\"href\":\"/posts/web3/EIP标准/EIP-150/\",\"date\":\"2026-4-15\",\"title\":\"EIP-150\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# EIP-150: IO 密集型操作的 Gas 成本调整 (Gas cost changes for IO-heavy operations) > **一句话总结**：EIP-150 大幅提高了 `EXTCODESIZE`、`EXTCODECOPY`、`BALANCE`、`SL\"},{\"href\":\"/posts/web3/DeFi协议/uniswap_v4/\",\"date\":\"2026-4-15\",\"title\":\"uniswap_v4\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# Uniswap V4: 可编程流动性平台 > **一句话总结**：Uniswap V4 打破了前代单纯做市引擎的身份，通过引入革命性的 Hooks（钩子系统）和万剑归宗的 Singleton（单例架构），彻底转型为一个允许开发者在其核心流动性之上搭建无数特色金融玩法的底层平台\"},{\"href\":\"/posts/web3/DeFi协议/uniswap_v3/\",\"date\":\"2026-4-15\",\"title\":\"uniswap_v3\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"V3 的核心目标只有一个：**解决 V2 资金利用率低下（Capital Inefficiency）的问题**。它通过引入“集中流动性”的概念，让 DeFi 的资本效率在理论上提升了 4000 倍，但也让协议的复杂度呈指数级上升。 ## 痛点：V2 的资金在“睡大觉” 先回顾 V\"},{\"href\":\"/posts/web3/DeFi协议/uniswap_v2/\",\"date\":\"2026-4-15\",\"title\":\"uniswap_v2\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"Uniswap V2 是以太坊上最经典的**去中心化交易所 (DEX)** 协议之一。它的核心在于彻底抛弃了传统金融的“订单薄” (Order Book) 模式，转而使用了 **自动做市商 (AMM)** 机制。 简单来说，Uniswap V2 就像一个始终在线的**自动机器人*\"},{\"href\":\"/posts/web3/DeFi协议/Curve/\",\"date\":\"2026-4-15\",\"title\":\"Curve\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# Curve Finance: 稳定兑换做市商协议 > **一句话总结**：Curve 是一个极大程度优化了同质化商品（如各种稳定币之间，或不同版本衍生资产之间）兑换深度的顶尖外汇钱庄。通过融合乘法和加法的“稳定交换曲线”，它成功将锚定资产之间的滑点降到了零的极限。 --- #\"},{\"href\":\"/posts/web3/DeFi协议/Aave/\",\"date\":\"2026-4-15\",\"title\":\"Aave\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# Aave: 点对池 (Peer-to-Pool) 去中心化借贷协议 > **一句话总结**：Aave 是一座规模极其庞沛、绝对无情但又绝对合规的“超级自动典当行”。它彻底干掉了传统银行业务的死穴（柜员、征信分数、纸质合同），只要你有足够硬的超额抵押品，金库大门随时为你无许可敞\"},{\"href\":\"/posts/web3/中美数字金融博弈：路线之争与战略演进/\",\"date\":\"2026-4-15\",\"title\":\"中美数字金融博弈：路线之争与战略演进\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"## 核心摘要 当前全球数字金融领域呈现出中美“双轨并行”的格局。**中国**选择了“严禁私人加密货币、主推央行数字货币（e-CNY）、利用香港作为合规试验田”的**强主权路线**，旨在维护金融防火墙与货币政策独立性。**美国**则转向“纳入监管、扶持私人稳定币、延伸美元霸权”的\"},{\"href\":\"/posts/web3/区块链技术原理/web3生态分层/\",\"date\":\"2026-4-15\",\"title\":\"web3生态分层\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"现在的WEB3生态，已经不是一个简单的比特币网络了，它演化成了一个庞大复杂的数字国家。我们可以用分层的方式来拆解它，就像理解一个城市的：地基、公路、水电煤、商业区。 ## 基础设施层 L0→L3 ### L0 底层传输层 它的主要作用是解决不同区块链，如比特币、以太坊、波卡等之间\"},{\"href\":\"/posts/web3/区块链技术原理/web3基础概念与实际意义/\",\"date\":\"2026-4-15\",\"title\":\"web3基础概念与实际意义\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"## 概念 > 要理解 Web3，得先看它是怎么演变来的。互联网到现在其实经历了三个阶段，可以理解为**数字社会的‘三次工业革命’**：” #### 第一阶段：Web 1 —— “只读互联网” (Read-Only) >“大约是 90 年代到 2004 年。那时是以新浪、搜狐、雅\"},{\"href\":\"/posts/web3/区块链技术原理/web3常见术语/\",\"date\":\"2026-4-15\",\"title\":\"web3常见术语\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# RPC RPC = Remote Procedure Call，即“远程过程调用”。 简单来说，就是一个程序（或客户端）可以像调用本地函数/方法一样，向远 端服务器节点（或服务）发出请求，让对方执行某个过程（procedure／方法／函 数），并返回结果。客户端自己并不关心这\"},{\"href\":\"/posts/web3/区块链技术原理/以太坊（世界计算机）/\",\"date\":\"2026-4-15\",\"title\":\"以太坊（世界计算机）\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"以太坊被称为 “世界计算机”，核心是它突破了比特币仅能处理简单价值转移的局限，靠去中心化架构、图灵完备的智能合约等技术，构建了一个全球可访问、能承载复杂计算与多样化应用的分布式计算平台。下面以计算机五层结构拆解分析 “图灵完备（Turing Complete）”这个概念源自“计算\"},{\"href\":\"/posts/web3/区块链技术原理/钱包/\",\"date\":\"2026-4-15\",\"title\":\"钱包\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# 钱包地址生成逻辑 # 钱包作用 一句话概括 **MetaMask 是一个以太坊钱包 + 浏览器插件，用来管理你的私钥、存放资产、发交易，并让你在网页上直接使用区块链应用（DApp）。** 就像： **它是你在区块链世界的“钥匙串 + 浏览器驱动 + 交易签名器”。** | *\"},{\"href\":\"/posts/web3/区块链技术原理/比特币基础/\",\"date\":\"2026-4-15\",\"title\":\"比特币基础\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"## 区块结构 区块头 | 字段 | 含义（简洁） | pwn 类比 | | ----------------------- | --------------- | ----------------------- | | **Version** | 节点使用哪代规则 | “str\"},{\"href\":\"/posts/web3/面试/ai模拟面试/jd_bitslab/\",\"date\":\"2026-4-15\",\"title\":\"jd_bitslab\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# Solidity 智能合约安全审计实习生 JD 来源：`jd_bitslab.jpg` ## 基本信息 - 岗位：Solidity 智能合约安全审计实习生 - 日薪：`300-500 元/天` - 地点：成都 · 武侯区 · 中和 - 出勤：`4 天/周` - 实习周期：`6\"},{\"href\":\"/posts/web3/面试/ai模拟面试/GPT-Voice模拟面试提示词/\",\"date\":\"2026-4-15\",\"title\":\"GPT-Voice模拟面试提示词\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"这份文件用于直接复制到 GPT Voice。 使用顺序： 1. 先发“资料卡” 2. 等它确认理解后，再发“开场词” 3. 模拟结束后，发“复盘词” 建议： - 不要一次塞整份题卡 - 资料尽量控制在 1 到 2 屏 - 一次只练一个岗位方向 - 如果你希望它“知道该问什么”，优\"},{\"href\":\"/posts/web3/面试/ai模拟面试/面试题卡-Voice题目版/\",\"date\":\"2026-4-15\",\"title\":\"面试题卡-Voice题目版\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"用途： - 让它知道“该问哪些题” - 不直接暴露你在完整题卡里的答案 使用方法： - 不建议把完整 [面试题卡.md](D:/md/web3/面试/面试题卡.md) 原样发送 - 建议把这份题目版和 `GPT Voice` 提示词一起发 - 告诉它：以这些题目为题库，但不要照着\"},{\"href\":\"/posts/web3/面试/ai模拟面试/1/\",\"date\":\"2026-4-15\",\"title\":\"1\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# 面试 Q&A 总结报告 ## 一、 面试基本信息 - **目标岗位**：Solidity 智能合约安全审计实习生（参考：智谷星图） - **面试轮次**：专业技术一面（模拟） - **评估时长**：约 15 分钟 - **整体评价**： - **优势**：基础概念清晰，对 E\"},{\"href\":\"/posts/web3/面试/面试项目资料源/sentiment/README/\",\"date\":\"2026-4-15\",\"title\":\"README\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# Sentiment 基于 Balancer 只读重入攻击复现 ## 事故概览 - 协议：Sentiment - 链上攻击时间：`2023-04-04 17:50:29 UTC` - 攻击区块：Arbitrum `77026913` - 推荐 fork 区块：`77026912\"},{\"href\":\"/posts/web3/面试/面试项目资料源/sentiment/audit_notes/\",\"date\":\"2026-4-15\",\"title\":\"audit_notes\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# Sentiment 2023-04-04 只读重入事件审计笔记 > 审计范围: `src/sentiment/modules/AccountManager/src/core/AccountManager.sol`、`src/sentiment/modules/Weighted\"},{\"href\":\"/posts/web3/面试/面试项目资料源/memscan/面试准备/\",\"date\":\"2026-4-15\",\"title\":\"面试准备\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# MemeScan 面试辅导资料（贴当前代码版） ## 先记住这句话 这不是一个“纯 LLM 审计工具”，而是一个**以链上仿真为主、轻量规则系统评分为骨架、LLM 做补充解释和追加分析**的 Web3 风险扫描系统。 面试时最重要的是两点： 1. 不要把设计稿里的能力当成全部\"},{\"href\":\"/posts/web3/面试/面试项目资料源/jd_bitslab/\",\"date\":\"2026-4-15\",\"title\":\"jd_bitslab\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# Solidity 智能合约安全审计实习生 JD 来源：`jd_bitslab.jpg` ## 基本信息 - 岗位：Solidity 智能合约安全审计实习生 - 日薪：`300-500 元/天` - 地点：成都 · 武侯区 · 中和 - 出勤：`4 天/周` - 实习周期：`6\"},{\"href\":\"/posts/web3/面试/面试项目资料源/euler/REPRO_SUMMARY/\",\"date\":\"2026-4-15\",\"title\":\"REPRO_SUMMARY\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# Euler Finance 漏洞复现说明 ## 1. 项目目标 本项目复现的是 Euler Finance 在 2023-03-13 的经典攻击路径，核心目标不是“把交易跑出来”这么简单，而是把下面三件事都讲清楚： 1. 漏洞为什么会发生 2. 攻击者如何把漏洞变成可兑现利润\"},{\"href\":\"/posts/web3/面试/面试项目资料源/euler/README/\",\"date\":\"2026-4-15\",\"title\":\"README\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# Euler Finance 漏洞复现工作区 这个仓库是面向审计与复现的 Euler Finance 漏洞脚手架，优先服务“先读后写”的分析流程。现在只维护一套源码树：协议源码全部放在 `src/euler/`，保持接近上游的可编译布局；审计直观性则通过根 README 和协议\"},{\"href\":\"/posts/web3/面试/面试项目资料源/euler/audit_notes/\",\"date\":\"2026-4-15\",\"title\":\"audit_notes\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# Euler Finance 审计笔记 > 审计范围: `src/euler/` 的核心架构与模块，重点关注 `Storage.sol`、`BaseLogic.sol`、`modules/EToken.sol`、`modules/DToken.sol`、`modules/Liq\"},{\"href\":\"/posts/web3/面试/面试项目资料源/blocksec面经/\",\"date\":\"2026-4-15\",\"title\":\"blocksec面经\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"一面（30min，ceo面）： 1. 脱离defi背景下，重入的本质是什么，抽象出来（时序漏洞变种，状态更新的操作不是原子化，不同函数访问临界资源导致竞争，解决方案：①资源锁（reentrancyGuard modifier），②状态更新操作原子化，③先更新状态变量再进行实际操作\"},{\"href\":\"/posts/web3/面试/面试题卡/\",\"date\":\"2026-4-15\",\"title\":\"面试题卡\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"这份文档用于集中存放 Web3 安全面试题卡。格式尽量固定，方便后续持续追加： - `问题`：面试官可能的问法 - `短答`：30 秒版本 - `展开`：2-3 分钟版本 - `关键词 / 公式 / 例子`：方便你快速复盘 --- ## Day 1：Storage 布局与代理模式\"},{\"href\":\"/posts/web3/面试/面试计划/\",\"date\":\"2026-4-15\",\"title\":\"面试计划\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# 10 天 Web3 安全面试冲刺计划 v2 这份 10 天冲刺计划继续沿用“攻防代偿”和“底层降维”的主线，但目标从“学很多”调整为“能稳定打面试”。核心不是覆盖更多知识点，而是把知识转化成 3 类可展示成果： 1. 能口头讲清楚的底层机制 2. 能跑通并解释的漏洞 PoC \"},{\"href\":\"/posts/web3/面试/面试高频清单/\",\"date\":\"2026-4-15\",\"title\":\"面试高频清单\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# 面试高频清单 这份清单用于最后冲刺，不代替完整题卡。使用方式： - 面试前 20 分钟：只看这份 - 被某一类问题追问得发虚：再回对应题卡 - 每次真实面试后：把新问法补进这里，再回填到题卡 --- ## 1. EVM / Proxy / 调用语义 - `call / del\"},{\"href\":\"/posts/web3/漏洞笔记/TWAP操纵漏洞/\",\"date\":\"2026-4-15\",\"title\":\"TWAP操纵漏洞\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# TWAP 操纵漏洞 (TWAP Manipulation) > **标签:** #漏洞类型/价格操纵 | #协议类型/DeFi/高阶借贷 | #严重程度/High ## 📌 1. TL;DR (一句话快速回顾) * **本质成因**：为了防御依靠“一次点击一笔交易”的闪电贷\"},{\"href\":\"/posts/web3/漏洞笔记/Delegatecall调用陷阱漏洞/\",\"date\":\"2026-4-15\",\"title\":\"Delegatecall调用陷阱漏洞\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# Delegatecall 调用陷阱 (Delegatecall Context *：在修改关键状态（如扣减余额）**之前**\"},{\"href\":\"/posts/web3/开发框架/\",\"date\":\"2026-4-15\",\"title\":\"开发框架\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# Scaffold-ETH 2 Scaffold-ETH 2 (SE-2) 是目前以太坊生态中最主流、最高效的**全栈开发脚手架（Boilerplate）**。 对于开发者，尤其是刚入门 Web3 的工程师，它解决了最大的痛点：**如何在本地快速搭建一套包含“前端 UI + 智\"},{\"href\":\"/posts/web3/合约审计/Damn-vulnerable-defi/\",\"date\":\"2026-4-15\",\"title\":\"Damn-vulnerable-defi\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# Unstoppable 有一个代币化金库，里面存有100万枚DVT代币。在宽限期结束前，它提供免费闪电贷服务。 为了在完全无需许可的情况下发现任何漏洞，开发人员决定在测试网上进行实时测试。他们还设置了监控合约来检查闪电贷功能的运行状况。 player账户余额为 10 个 DV\"},{\"href\":\"/posts/web3/合约审计/以太航员挑战/\",\"date\":\"2026-4-15\",\"title\":\"以太航员挑战\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# 控制台用法 await contract：显示当前关卡所有可用方法 看slot内容 ```solidity await web3.eth.getStorageAt(\\\"0x3b5520d524eEB80ad38BdC961cDFfAB7fa62bBcE\\\", 0) ``` DEX\"},{\"href\":\"/posts/web3/合约审计/审计思路与常见合约设计/\",\"date\":\"2026-4-15\",\"title\":\"审计思路与常见合约设计\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# 审计思路 这是每一位 Web3 安全工程师新手的必经之路。面对几百行代码感到不知所措是非常正常的。 别担心，专业的审计并不是从第一行读到最后一行。我们有一套**标准化的审计“战术流程”**。 --- ### 第一步：鸟瞰全貌 **目的**：搞清楚“这合约是干嘛的”、“它使用了\"},{\"href\":\"/posts/web3/工具/\",\"date\":\"2026-4-15\",\"title\":\"工具\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"- **Hardhat**：如果你喜欢 **JavaScript**，以后想做全栈开发（写前端网页跟合约交互），Hardhat 是必经之路。因为它的测试代码和前端代码很像。 - **Foundry**：如果你想做**纯合约开发**，追求极致的速度和像黑客一样的快感，Foundry\"},{\"href\":\"/posts/web3/代理模式/UUPS_Proxy/\",\"date\":\"2026-4-15\",\"title\":\"UUPS_Proxy\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# UUPS Proxy（通用可升级代理标准） > **一句话总结**：UUPS（Universal Upgradeable Proxy Standard）将升级逻辑从 Proxy 搬到了 **Implementation 合约自身**中，使得 Proxy 退化成一个极简的纯转发\"},{\"href\":\"/posts/web3/代理模式/Transparent_Proxy/\",\"date\":\"2026-4-15\",\"title\":\"Transparent_Proxy\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# Transparent Proxy（透明代理） > **一句话总结**：Transparent Proxy 将升级逻辑放在 **Proxy 合约自身**中，并通过 **`msg.sender` 路由机制**从根源上消灭了函数选择器冲突（Selector Clash）——Adm\"},{\"href\":\"/posts/web3/代理模式/Diamond_Proxy/\",\"date\":\"2026-4-15\",\"title\":\"Diamond_Proxy\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# Diamond Proxy（钻石代理 / ERC-2535） > **一句话总结**：Diamond Proxy 是一种**多面代理（Multi-Facet Proxy）**标准，将一个 Proxy 的后端拆分成多个独立的 **Facet（切面）**合约，每个 Facet 承\"},{\"href\":\"/posts/web3/代理模式/代理模式是什么/\",\"date\":\"2026-4-15\",\"title\":\"代理模式是什么\",\"folder\":\"web3\",\"tags\":[],\"summary\":\"# 代理模式核心概念 > **一句话总结**：代理模式（Proxy Pattern）是以太坊智能合约\\\"可升级\\\"的底层基石，利用 `delegatecall` 操作码实现**代码与数据的物理分离**——用户永远与同一个地址（Proxy）交互，而 Proxy 背后指向的业务逻辑代码（\"},{\"href\":\"/posts/计算机基础/计算机组成/\",\"date\":\"2026-4-15\",\"title\":\"计算机组成\",\"folder\":\"计算机基础\",\"tags\":[],\"summary\":\"# 字符编码 【锟斤拷�⊠是怎样炼成的——中文显示“⼊”门指南【柴知道】】 [https://www.bilibili.com/video/BV1cB4y177QR/?share_source=copy_web&vd_source=87a11b85578403cdea5acfdf\"},{\"href\":\"/posts/计算机基础/计算机网络/\",\"date\":\"2026-4-15\",\"title\":\"计算机网络\",\"folder\":\"计算机基础\",\"tags\":[],\"summary\":\"# IP地址 ## 是什么 设备连入互联网会分配一个ip地址，作为‘居住地址信息’以便精准找到目标服务器或计算机 如我们访问网站，看似网址不是ip地址格式但它会通过DNS转换为ip地址形式进行访问。 ## 格式 • IPv4：32 位二进制，写成 4 段十进制，如 192.168\"},{\"href\":\"/posts/车联网/车联网安全概述/\",\"date\":\"2026-4-15\",\"title\":\"车联网安全概述\",\"folder\":\"车联网\",\"tags\":[],\"summary\":\"介绍车联网安全,它的一些基本的名词概念,还有它的一些漏洞点, # HU 中控屏/主机（Head Unit），是车辆中央控制系统的核心部件之一。HU通常位于汽车仪表板中央位置，是车辆信息娱乐系统的主要控制面板，用于控制车辆的音频、导航、电话、车况、气候控制等多个功能。 HU别名叫车\"},{\"href\":\"/posts/车联网/车机渗透思路/\",\"date\":\"2026-4-15\",\"title\":\"车机渗透思路\",\"folder\":\"车联网\",\"tags\":[],\"summary\":\"[https://www.freebuf.com/articles/terminal/241930.html](https://www.freebuf.com/articles/terminal/241930.html) # 车机是什么 车机，即车载信息娱乐系统（In-Vehic\"}]";

  // @ts-nocheck
  const banner = document.getElementById("hero-banner");
  if (banner) {
    window.addEventListener("load", () => banner.classList.add("loaded"));
  }

  const nav = document.querySelector(".topbar-hero");
  if (nav) {
    window.addEventListener(
      "scroll",
      () => {
        nav.classList.toggle("scrolled", window.scrollY > 60);
      },
      { passive: true },
    );
  }

  const scrollBtn = document.getElementById("scroll-down-btn");
  if (scrollBtn) {
    scrollBtn.addEventListener("click", (event) => {
      event.preventDefault();
      document.getElementById("articles")?.scrollIntoView({ behavior: "smooth" });
    });
  }

  const canvas = document.getElementById("hero-particles");
  if (canvas) {
    const ctx = canvas.getContext("2d");
    let width;
    let height;
    let particles;

    const initParticles = () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      particles = Array.from({ length: 80 }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        r: Math.random() * 2 + 0.5,
        vy: Math.random() * 0.8 + 0.3,
        opacity: Math.random() * 0.8 + 0.2,
      }));
    };

    const drawParticles = () => {
      ctx.clearRect(0, 0, width, height);
      particles.forEach((particle) => {
        ctx.fillStyle = `rgba(255,255,255,${particle.opacity})`;
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.r, 0, Math.PI * 2);
        ctx.fill();
        particle.y += particle.vy;
        if (particle.y > height) {
          particle.y = -10;
          particle.x = Math.random() * width;
        }
      });
      requestAnimationFrame(drawParticles);
    };

    initParticles();
    drawParticles();
    window.addEventListener("resize", initParticles);
  }

  const archivePosts = JSON.parse(archivePostsJson);
  const PAGE_SIZE = 12;
  const totalPages = Math.max(1, Math.ceil(archivePosts.length / PAGE_SIZE));
  const grid = document.getElementById("archive-grid");
  const paginationEl = document.getElementById("pagination");
  const archiveSection = document.getElementById("archive-section");

  function clampPage(page) {
    return Math.min(Math.max(page, 1), totalPages);
  }

  function syncPageParam(page) {
    const url = new URL(window.location.href);
    if (page <= 1) {
      url.searchParams.delete("page");
    } else {
      url.searchParams.set("page", String(page));
    }
    history.replaceState({}, "", `${url.pathname}${url.search}${url.hash}`);
  }

  function renderPage(page) {
    const currentPage = clampPage(page);
    const start = (currentPage - 1) * PAGE_SIZE;
    const slice = archivePosts.slice(start, start + PAGE_SIZE);

    syncPageParam(currentPage);

    if (grid) {
      grid.style.opacity = "0";
      grid.innerHTML = slice
        .map(
          (post) => `
            <a href="${post.href}" class="post-card">
              <div class="post-card__top">
                <h3 class="post-card__title">${post.title}</h3>
              </div>
              <div class="post-card__bottom">
                <p class="post-card__summary">${post.summary || post.title}</p>
                <div class="post-card__meta-row">
                  <span class="post-card__date">
                    <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    ${post.date}
                  </span>
                  <span class="post-card__folder">
                    <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                    ${post.folder}
                  </span>
                </div>
                ${
                  post.tags.length > 0
                    ? `<div class="post-card__tags">${post.tags
                        .map((tag) => `<span class="post-card__tag">${tag}</span>`)
                        .join("")}</div>`
                    : ""
                }
              </div>
            </a>
          `,
        )
        .join("");

      requestAnimationFrame(() => {
        grid.style.transition = "opacity 0.25s ease";
        grid.style.opacity = "1";
      });
    }

    if (paginationEl) {
      paginationEl.innerHTML = `
        <button class="page-arrow" ${currentPage === 1 ? "disabled" : ""} data-page="${currentPage - 1}" aria-label="上一页">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="pagination-center">
          <span class="page-info">第 ${currentPage} / ${totalPages} 页</span>
          <label class="page-jump" for="page-jump-input">
            <span>跳到</span>
            <input id="page-jump-input" class="page-jump-input" type="number" min="1" max="${totalPages}" value="${currentPage}" inputmode="numeric" />
            <span>页</span>
          </label>
          <button class="page-jump-button" type="button">前往</button>
        </div>
        <button class="page-arrow" ${currentPage === totalPages ? "disabled" : ""} data-page="${currentPage + 1}" aria-label="下一页">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      `;

      paginationEl.querySelectorAll(".page-arrow:not([disabled])").forEach((button) => {
        button.addEventListener("click", () => {
          const target = Number(button.dataset.page);
          renderPage(target);
          archiveSection?.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      });

      const jumpInput = paginationEl.querySelector(".page-jump-input");
      const jumpButton = paginationEl.querySelector(".page-jump-button");

      const jumpToPage = () => {
        const target = Number(jumpInput?.value);
        if (!Number.isFinite(target)) return;
        renderPage(target);
        archiveSection?.scrollIntoView({ behavior: "smooth", block: "start" });
      };

      jumpButton?.addEventListener("click", jumpToPage);
      jumpInput?.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          jumpToPage();
        }
      });
    }
  }

  if (archivePosts.length > 0) {
    const initialPage = Number(new URL(window.location.href).searchParams.get("page")) || 1;
    renderPage(initialPage);
  }
})();</script>
