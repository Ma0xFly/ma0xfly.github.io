    </script><link rel="stylesheet" href="/_astro/_folder_.XLusA-kG.css"></head> <body class="is-home"> <!-- 首页导航栏：右侧对齐链接和主题切换 --> <header class="topbar topbar-hero"> <div class="topbar-inner-hero"> <nav class="nav-links"> <a href="/">首页</a> <a href="/folders">目录</a> <a href="/tags">标签</a> <button id="theme-toggle" type="button" aria-label="切换主题"> <span class="theme-icon theme-sun">☼</span> <span class="theme-icon theme-moon">☾</span> </button> </nav> </div> </header> <main id="main-content" class="home-main">   <div class="hero-banner" id="hero-banner"> <div class="hero-banner__bg"></div> <div class="hero-banner__overlay"></div> <canvas id="hero-particles"></canvas> <div class="hero-banner__content"> <h1 class="hero-banner__title">Ma&OxFly</h1> <p class="hero-banner__sub">鹏北海，凤朝阳。又携书剑路茫茫。</p> <a href="#articles" class="hero-banner__cta" id="scroll-down-btn"> <span class="hero-banner__arrow"> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"></path></svg> </span> </a> </div> </div>  <div id="articles" class="articles-container">     <section class="garden-section"> <div class="section-head"> <h2>归档</h2> <p>按时间顺序查看所有已公开文章。</p> </div> <div class="empty-state"> <p>暂时没有更多归档内容。</p> </div> </section> </div>  </main> <script>
      (() => {
        const root = document.documentElement;
        const bindToggle = () => {
          const btn = document.getElementById("theme-toggle");
          if (!btn) return;
          const next = btn.cloneNode(true);
          btn.replaceWith(next);
          next.addEventListener("click", () => {
            const current = root.getAttribute("data-theme") === "dark" ? "dark" : "light";
            const value = current === "dark" ? "light" : "dark";
            root.setAttribute("data-theme", value);
            try { localStorage.setItem("theme", value); } catch {}
          });
        };
        bindToggle();
      })();
    </script> </body> </html>  <script>
  // Hero 图片加载后触发缩放动画
  const banner = document.getElementById('hero-banner');
  if (banner) {
    window.addEventListener('load', () => {
      banner.classList.add('loaded');
    });
  }

  // 滚动时导航栏变半透明
  const nav = document.querySelector('.topbar-hero');
  if (nav) {
    window.addEventListener('scroll', () => {
      if (window.scrollY > 60) {
        nav.classList.add('scrolled');
      } else {
        nav.classList.remove('scrolled');
      }
    }, { passive: true });
  }

  // 平滑滚动到 #articles
  const scrollBtn = document.getElementById('scroll-down-btn');
  if (scrollBtn) {
    scrollBtn.addEventListener('click', (e) => {
      e.preventDefault();
      const target = document.getElementById('articles');
      if (target) {
        target.scrollIntoView({ behavior: 'smooth' });
      }
    });
  }

  // 粒子效果
  const canvas = document.getElementById('hero-particles');
  if (canvas) {
    const ctx = canvas.getContext('2d');
    let w, h, particles;
    const initParticles = () => {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      particles = Array.from({length: 80}, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() * 2 + 0.5,
        vy: Math.random() * 0.8 + 0.3,
        opacity: Math.random() * 0.8 + 0.2
      }));
    };
    const drawParticles = () => {
      ctx.clearRect(0, 0, w, h);
      particles.forEach(p => {
        ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        p.y += p.vy;
        if (p.y > h) {
          p.y = -10;
          p.x = Math.random() * w;
        }
      });
      requestAnimationFrame(drawParticles);
    };
    initParticles();
    drawParticles();
    window.addEventListener('resize', initParticles);
  }
</script>
